# ── Routing ────────────────────────────────────────────────────────────────────
# Route messages to specific agents. Evaluated in order; first match wins.
# Priority: channel_pattern > sender_id > default

# Route Telegram @dev_bot to the coder agent
# [[routing]]
# channel_pattern = "telegram:@dev_bot"
# agent = "coder"

# Route a specific user to coder
# [[routing]]
# sender_id = "123456789"
# agent = "coder"

# Default: everything goes to assistant
[[routing]]
default = true
agent = "assistant"

# ── Memory ─────────────────────────────────────────────────────────────────────

[memory]
backend = "sqlite"                 # options: sqlite, markdown, none
path = "memory.db"                 # file path for sqlite or markdown directory
embedding_provider = "none"        # options: none, fastembed (local), openai
# embed_api_key = "sk-..."         # required if embedding_provider = "openai"
# embed_base_url = "..."           # optional custom OpenAI-compatible endpoint
# vector_weight = 0.6              # RRF weight for vector search (0.0–1.0)
# keyword_weight = 0.4             # RRF weight for FTS5 keyword search
# ttl_days = 90                    # days before memory entries expire (0 = never)

# ── Security ───────────────────────────────────────────────────────────────────

[security]
# Autonomy level: readonly | supervised | full
# - readonly:   no tool execution
# - supervised: CLI prompts before each tool call (default)
# - full:       fully autonomous — use Docker in production!
autonomy_level = "supervised"

workspace = "./workspace"          # AI's sandboxed working directory
# allowlist = []                   # global sender whitelist (empty = allow all)
# allow_full_outside_container = false  # suppress container warning for Full mode

[security.rate_limit]
per_user = 60                      # messages per user per minute
per_channel = 200                  # messages per channel per minute
max_actions_per_hour = 100         # tool calls per hour (0 = unlimited)
daily_cost_budget_usd = 10.0       # USD per day limit (0 = unlimited)

# audit_log = ".adaclaw/audit.jsonl"        # structured audit log (SIEM-ready)
# estop_state_path = ".adaclaw/estop.json"  # emergency stop state persistence
# require_otp_for_estop = false             # require TOTP to clear estop

# ── Gateway ────────────────────────────────────────────────────────────────────
# HTTP API gateway (REST + Prometheus metrics endpoint)

[gateway]
bind = "127.0.0.1:8080"           # NEVER bind to 0.0.0.0 without a reverse proxy
# bearer_token = "change-me-please"  # required for /v1/chat and /v1/stop

# ── Tunnel (optional) ──────────────────────────────────────────────────────────
# Expose the local gateway to the internet for webhooks.
# Options: none | cloudflare | ngrok | tailscale

[tunnel]
provider = "none"                  # set to "cloudflare", "ngrok", or "tailscale"
# cloudflare_token = "..."         # Cloudflare Tunnel token (cloudflared)
# ngrok_token = "..."              # ngrok auth token
# ngrok_domain = "my-app.ngrok-free.app"  # optional fixed domain
# tailscale_funnel = false         # use Tailscale Funnel (requires tailscale daemon)

# ── Observability ──────────────────────────────────────────────────────────────

[observability]
backend = "log"                    # options: noop, log, prometheus
# runtime_trace_path = ".adaclaw/runtime-trace.jsonl"   # JSONL event log
# runtime_trace_max_entries = 1000                       # rolling window size (0 = unlimited)
