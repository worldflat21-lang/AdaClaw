# AdaClaw configuration file
# Copy to config.toml and edit: cp config.example.toml config.toml
#
# Quick start: run `adaclaw onboard` to generate this file interactively.
# Docs: https://github.com/worldflat21-lang/AdaClaw

# ── Providers ──────────────────────────────────────────────────────────────────
# At least one provider must be configured (or set API key env var).
# Supported: openai, anthropic, openrouter, deepseek, ollama

[providers.openrouter]
api_key = "sk-or-..."              # Or env var: OPENROUTER_API_KEY
default_model = "anthropic/claude-3.5-sonnet"
timeout_secs = 60

# [providers.openai]
# api_key = "sk-..."               # Or env var: OPENAI_API_KEY
# default_model = "gpt-4o"
# # base_url = "https://api.openai.com/v1"  # custom endpoint (optional)
# timeout_secs = 60

# [providers.anthropic]
# api_key = "sk-ant-..."           # Or env var: ANTHROPIC_API_KEY
# default_model = "claude-3-5-sonnet-20241022"

# [providers.deepseek]
# api_key = "sk-..."               # Or env var: DEEPSEEK_API_KEY
# default_model = "deepseek-chat"

# [providers.ollama]
# base_url = "http://localhost:11434"
# default_model = "llama3"

# ── Agents ─────────────────────────────────────────────────────────────────────
# Each agent maps to a provider and can have its own tools/workspace.

[agents.assistant]
provider = "openrouter"
model = "anthropic/claude-3.5-sonnet"
temperature = 0.7                  # 0.0 = deterministic, 1.0 = creative
max_iterations = 10                # max tool call loops per turn
# tools = []                       # empty = allow all; or list: ["shell", "file_read"]
# workspace = "~/.adaclaw/workspace-assistant"
# system_extra = "You are a helpful assistant."

[agents.assistant.subagents]
allow = ["coder"]                  # agents this agent can delegate to; [] = no delegation

# [agents.coder]
# provider = "anthropic"
# model = "claude-3-5-sonnet-20241022"
# temperature = 0.2
# tools = ["shell", "file_read", "file_write", "file_list"]
# workspace = "~/.adaclaw/workspace-coder"
#
# [agents.coder.subagents]
# allow = []                       # coder cannot delegate (prevents recursion)

# ── Channels ───────────────────────────────────────────────────────────────────
# CLI channel is always active (no config needed).

# [channels.telegram]
# kind = "telegram"
# token = "1234567890:ABCdefGHIjklMNOpqrSTUvwxYZ"
# allow_from = ["your_username", "123456789"]       # empty = allow all
# allow_from_groups = []                            # group whitelist
# require_mention = false                           # require @botname in groups

